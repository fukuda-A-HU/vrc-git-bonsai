name: release-vpm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from package.json
        id: package
        run: |
          version=$(jq -r .version unity/Packages/com.fukuda-a-hu.vrc-git-bonsai/package.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package VPM zip
        run: |
          zip_name="com.fukuda-a-hu.vrc-git-bonsai-${{ steps.package.outputs.version }}.zip"
          echo "zip_name=$zip_name" >> "$GITHUB_ENV"
          cd unity/Packages/com.fukuda-a-hu.vrc-git-bonsai
          zip -r "$GITHUB_WORKSPACE/$zip_name" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.zip_name }}
